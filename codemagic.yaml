workflows:
  ios-app-store:
    name: MedNote AI - iOS App Store
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: MedNote
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.mednote.ai
      vars:
        APP_ID: com.mednote.ai
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App
        XCODE_CONFIGURATION: Release
      node: 20.11.0
    scripts:
      - name: Install dependencies
        script: npm install

      - name: Build web app
        script: npm run build

      - name: Sync web assets to iOS
        script: |
          mkdir -p ios/App/App/public
          cp -r dist/public/. ios/App/App/public/
          node -e "
            const fs = require('fs');
            const cfg = {
              appId: 'com.mednote.ai',
              appName: 'MedNote AI',
              webDir: 'dist/public',
              server: { url: 'https://098b918f-8c03-405d-b6f6-d89ed3290933-00-3q3amhlze1ape.kirk.replit.dev', cleartext: false },
              ios: { contentInset: 'automatic' }
            };
            fs.writeFileSync('ios/App/App/capacitor.config.json', JSON.stringify(cfg, null, 2));
          "

      - name: Install CocoaPods dependencies
        script: |
          cd ios/App
          pod install

      - name: Set up code signing
        script: xcode-project use-profiles

      - name: Increment build number
        script: |
          cd ios/App
          LATEST_BUILD_NUMBER=$(app-store-connect get-latest-build-number "$APP_ID" 2>/dev/null || echo 0)
          agvtool new-version -all $((LATEST_BUILD_NUMBER + 1))

      - name: Build and export IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --config "$XCODE_CONFIGURATION"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
