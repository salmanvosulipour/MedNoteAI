workflows:
  ios-app-store:
    name: MedNote AI - iOS App Store
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: MedNote
    environment:
      xcode: 17
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.mednote.ai
      vars:
        APP_ID: com.mednote.ai
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App
        XCODE_CONFIGURATION: Release
      node: 20.11.0
    scripts:
      - name: Install dependencies
        script: npm install

      - name: Build web app
        script: npm run build

      - name: Sync web assets to iOS
        script: |
          # Manually copy web assets — avoids npx cap sync overwriting Podfile / capacitor.config.json
          mkdir -p ios/App/App/public
          cp -r dist/public/. ios/App/App/public/

          # Ensure capacitor.config.json inside iOS bundle has the correct packageClassList
          # Capacitor 8 reads this to register plugins via NSClassFromString
          node -e "
            const fs = require('fs');
            const cfgPath = 'ios/App/App/capacitor.config.json';
            const cfg = {
              appId: 'com.mednote.ai',
              appName: 'MedNote AI',
              webDir: 'dist/public',
              ios: { contentInset: 'automatic' },
              packageClassList: ['SignInWithApple', 'PurchasesPlugin']
            };
            fs.writeFileSync(cfgPath, JSON.stringify(cfg, null, 2));
            console.log('capacitor.config.json written:', JSON.stringify(cfg));
          "

          # Ensure config.xml exists (required by Xcode build)
          node -e "
            const fs = require('fs');
            if (!fs.existsSync('ios/App/App/config.xml')) {
              fs.writeFileSync('ios/App/App/config.xml', '<?xml version=\'1.0\' encoding=\'utf-8\'?>\n<widget version=\"1.0.0\" xmlns=\"http://www.w3.org/ns/widgets\" xmlns:cdv=\"http://cordova.apache.org/ns/1.0\">\n  <access origin=\"*\" />\n</widget>\n');
            }
          "

          echo "=== capacitor.config.json (final) ==="
          cat ios/App/App/capacitor.config.json
          echo "=== Podfile capacitor_pods section ==="
          grep -A 10 "def capacitor_pods" ios/App/Podfile

      - name: Register Apple Sign In plugin in AppDelegate
        script: |
          APPDELEGATE="ios/App/App/AppDelegate.swift"
          if ! grep -q "CapacitorCommunityAppleSignIn" "$APPDELEGATE"; then
            sed -i '' 's/^import Capacitor$/import Capacitor\nimport CapacitorCommunityAppleSignIn/' "$APPDELEGATE"
            echo "Injected CapacitorCommunityAppleSignIn import into AppDelegate.swift"
          else
            echo "CapacitorCommunityAppleSignIn already imported"
          fi
          if ! grep -q "RevenuecatPurchasesCapacitor" "$APPDELEGATE"; then
            sed -i '' 's/^import Capacitor$/import Capacitor\nimport RevenuecatPurchasesCapacitor/' "$APPDELEGATE"
            echo "Injected RevenuecatPurchasesCapacitor import into AppDelegate.swift"
          else
            echo "RevenuecatPurchasesCapacitor already imported"
          fi
          cat "$APPDELEGATE" | head -6

      - name: Install CocoaPods dependencies
        script: |
          cd ios/App
          # Force clean install so cached Pods never hide missing plugins
          rm -rf Pods Podfile.lock
          pod install --repo-update

      - name: Set up code signing
        script: |
          # use-profiles reads entitlements from project and fetches/creates a matching
          # provisioning profile that includes Sign in with Apple
          xcode-project use-profiles
          echo "=== Installed provisioning profiles ==="
          security cms -D -i ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision 2>/dev/null \
            | plutil -extract Entitlements xml1 - -o - 2>/dev/null \
            | grep -A1 "applesignin" || echo "Sign in with Apple not found in profile"

      - name: Increment build number
        script: |
          BUILD_NUMBER=$(date +%s)
          echo "=== BUILD NUMBER: $BUILD_NUMBER ==="
          # Patch Info.plist with literal value (no variable reference)
          PLIST="ios/App/App/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 1.1" "$PLIST"
          echo "=== Info.plist after patch ==="
          /usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$PLIST"
          /usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$PLIST"
          # Patch xcodeproj build settings as backup
          sed -i '' "s/CURRENT_PROJECT_VERSION = [0-9]*/CURRENT_PROJECT_VERSION = $BUILD_NUMBER/" ios/App/App.xcodeproj/project.pbxproj
          echo "=== pbxproj CURRENT_PROJECT_VERSION after patch ==="
          grep "CURRENT_PROJECT_VERSION" ios/App/App.xcodeproj/project.pbxproj

      - name: Build and export IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --verbose

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: false
        submit_to_app_store: false
