workflows:
  ios-app-store:
    name: MedNote AI - iOS App Store
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: MedNote
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.mednote.ai
      vars:
        APP_ID: com.mednote.ai
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App
        XCODE_CONFIGURATION: Release
      node: 20.11.0
    scripts:
      - name: Install dependencies
        script: npm install

      - name: Build web app
        script: npm run build

      - name: Sync web assets to iOS
        script: |
          mkdir -p ios/App/App/public
          cp -r dist/public/. ios/App/App/public/
          cp capacitor.config.ts ios/App/App/ 2>/dev/null || true
          node -e "
            const fs = require('fs');
            const cfg = {
              appId: 'com.mednote.ai',
              appName: 'MedNote AI',
              webDir: 'dist/public',
              server: { url: 'https://098b918f-8c03-405d-b6f6-d89ed3290933-00-3q3amhlze1ape.kirk.replit.dev', cleartext: false },
              ios: { contentInset: 'automatic' }
            };
            fs.writeFileSync('ios/App/App/capacitor.config.json', JSON.stringify(cfg, null, 2));
          "

      - name: Install CocoaPods dependencies
        script: |
          cd ios/App
          pod install

      - name: Set up code signing
        script: xcode-project use-profiles

      - name: Increment build number
        script: |
          cd ios/App
          LATEST_BUILD_NUMBER=$(app-store-connect get-latest-build-number "$APP_ID" 2>/dev/null || echo 0)
          agvtool new-version -all $((LATEST_BUILD_NUMBER + 1))

      - name: Build iOS app for App Store
        script: |
          ARCHIVE_PATH="$HOME/archive/App.xcarchive"
          mkdir -p "$HOME/archive"
          xcodebuild archive \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration "$XCODE_CONFIGURATION" \
            -archivePath "$ARCHIVE_PATH" \
            -destination "generic/platform=iOS" \
            -allowProvisioningUpdates
          ls -la "$HOME/archive/" || echo "Archive directory empty"

      - name: Export IPA
        script: |
          set -e
          ARCHIVE_PATH="$HOME/archive/App.xcarchive"
          mkdir -p "$HOME/ipa"
          echo "=== Checking archive exists ==="
          ls -la "$HOME/archive/" || { echo "ERROR: Archive not found!"; exit 1; }
          echo "=== Exporting IPA ==="
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$HOME/ipa" \
            -exportOptionsPlist ios/App/ExportOptions.plist \
            -allowProvisioningUpdates 2>&1
          echo "=== IPA output ==="
          ls -la "$HOME/ipa/"
          IPA_COUNT=$(ls "$HOME/ipa/"*.ipa 2>/dev/null | wc -l)
          if [ "$IPA_COUNT" -eq 0 ]; then
            echo "ERROR: No IPA file was produced!"
            exit 1
          fi
          echo "SUCCESS: IPA created at $HOME/ipa/"

    artifacts:
      - $HOME/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
