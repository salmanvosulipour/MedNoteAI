workflows:
  ios-app-store:
    name: MedNote AI - iOS App Store
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: MedNote
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.mednote.ai
      vars:
        APP_ID: com.mednote.ai
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App
        XCODE_CONFIGURATION: Release
      node: 20.11.0
    scripts:
      - name: Install dependencies
        script: npm install

      - name: Build web app
        script: npm run build

      - name: Sync web assets to iOS
        script: |
          # Write root capacitor config so npx cap sync knows where web assets are
          node -e "
            const fs = require('fs');
            const cfg = {
              appId: 'com.mednote.ai',
              appName: 'MedNote AI',
              webDir: 'dist/public',
              server: { url: 'https://098b918f-8c03-405d-b6f6-d89ed3290933-00-3q3amhlze1ape.kirk.replit.dev', cleartext: false },
              ios: { contentInset: 'automatic' }
            };
            fs.writeFileSync('capacitor.config.json', JSON.stringify(cfg, null, 2));
          "
          # Create config.xml required by Xcode build if not present
          node -e "
            const fs = require('fs');
            if (!fs.existsSync('ios/App/App/config.xml')) {
              fs.writeFileSync('ios/App/App/config.xml', '<?xml version=\'1.0\' encoding=\'utf-8\'?>\n<widget version=\"1.0.0\" xmlns=\"http://www.w3.org/ns/widgets\" xmlns:cdv=\"http://cordova.apache.org/ns/1.0\">\n  <access origin=\"*\" />\n</widget>\n');
            }
          "
          # Sync web assets + register all Capacitor plugins (including Apple Sign In)
          npx cap sync ios

          # cap sync may overwrite capacitor.config.json inside the iOS bundle — patch it back
          # Capacitor 8 reads packageClassList from this file to register plugins via NSClassFromString
          node -e "
            const fs = require('fs');
            const cfgPath = 'ios/App/App/capacitor.config.json';
            const cfg = JSON.parse(fs.readFileSync(cfgPath, 'utf8'));
            cfg.packageClassList = ['SignInWithApple'];
            fs.writeFileSync(cfgPath, JSON.stringify(cfg, null, 2));
            console.log('Patched packageClassList:', cfg.packageClassList);
          "

      - name: Register Apple Sign In plugin in AppDelegate
        script: |
          APPDELEGATE="ios/App/App/AppDelegate.swift"
          if ! grep -q "CapacitorCommunityAppleSignIn" "$APPDELEGATE"; then
            sed -i '' 's/^import Capacitor$/import Capacitor\nimport CapacitorCommunityAppleSignIn/' "$APPDELEGATE"
            echo "Injected CapacitorCommunityAppleSignIn import into AppDelegate.swift"
          else
            echo "CapacitorCommunityAppleSignIn already imported"
          fi
          cat "$APPDELEGATE" | head -5

      - name: Install CocoaPods dependencies
        script: |
          cd ios/App
          pod install

      - name: Set up code signing
        script: xcode-project use-profiles

      - name: Increment build number
        script: |
          BUILD_NUMBER=$(date +%s)
          echo "=== BUILD NUMBER: $BUILD_NUMBER ==="
          # Patch Info.plist with literal value (no variable reference)
          PLIST="ios/App/App/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 1.1" "$PLIST"
          echo "=== Info.plist after patch ==="
          /usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$PLIST"
          /usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$PLIST"
          # Patch xcodeproj build settings as backup
          sed -i '' "s/CURRENT_PROJECT_VERSION = [0-9]*/CURRENT_PROJECT_VERSION = $BUILD_NUMBER/" ios/App/App.xcodeproj/project.pbxproj
          echo "=== pbxproj CURRENT_PROJECT_VERSION after patch ==="
          grep "CURRENT_PROJECT_VERSION" ios/App/App.xcodeproj/project.pbxproj

      - name: Build and export IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --verbose

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
