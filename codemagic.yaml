workflows:
  ios-app-store:
    name: MedNote AI - iOS App Store
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: MedNote
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.mednote.ai
      vars:
        APP_ID: com.mednote.ai
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App
        XCODE_CONFIGURATION: Release
      node: 20.11.0
    scripts:
      - name: Install dependencies
        script: npm install

      - name: Build web app
        script: npm run build

      - name: Sync web assets to iOS
        script: |
          mkdir -p ios/App/App/public
          cp -r dist/public/. ios/App/App/public/
          node -e "
            const fs = require('fs');
            const cfg = {
              appId: 'com.mednote.ai',
              appName: 'MedNote AI',
              webDir: 'dist/public',
              server: { url: 'https://098b918f-8c03-405d-b6f6-d89ed3290933-00-3q3amhlze1ape.kirk.replit.dev', cleartext: false },
              ios: { contentInset: 'automatic' }
            };
            fs.writeFileSync('ios/App/App/capacitor.config.json', JSON.stringify(cfg, null, 2));
          "
          # Create config.xml required by Xcode build if not present
          node -e "
            const fs = require('fs');
            if (!fs.existsSync('ios/App/App/config.xml')) {
              fs.writeFileSync('ios/App/App/config.xml', '<?xml version=\'1.0\' encoding=\'utf-8\'?>\n<widget version=\"1.0.0\" xmlns=\"http://www.w3.org/ns/widgets\" xmlns:cdv=\"http://cordova.apache.org/ns/1.0\">\n  <access origin=\"*\" />\n</widget>\n');
            }
          "

      - name: Install CocoaPods dependencies
        script: |
          cd ios/App
          pod install

      - name: Set up code signing
        script: xcode-project use-profiles

      - name: Increment build number
        script: |
          cd ios/App
          # Unique build number: minutes elapsed since Jan 1 2024
          BASE=1704067200
          NOW=$(date +%s)
          BUILD_NUMBER=$(( (NOW - BASE) / 60 ))
          echo "Setting build number to: $BUILD_NUMBER"
          # Set via xcodeproj AND Info.plist directly for reliability
          agvtool new-version -all $BUILD_NUMBER || true
          PLIST="App/Info.plist"
          if [ -f "$PLIST" ]; then
            /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" "$PLIST"
            /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 1.1" "$PLIST"
          fi
          # Also update xcodeproj settings directly
          sed -i '' "s/CURRENT_PROJECT_VERSION = .*/CURRENT_PROJECT_VERSION = $BUILD_NUMBER;/" App.xcodeproj/project.pbxproj
          sed -i '' "s/MARKETING_VERSION = .*/MARKETING_VERSION = 1.1;/" App.xcodeproj/project.pbxproj
          echo "Build number set. Verifying:"
          agvtool what-version || true

      - name: Build and export IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --verbose

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
